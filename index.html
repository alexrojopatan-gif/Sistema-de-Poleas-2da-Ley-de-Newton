<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Poleas - Newton</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    min-height:100vh;
    color:white;
    overflow-x:hidden;
}

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.titulo{
    text-align:center;
    font-size:38px;
    font-weight:700;
    margin-bottom:25px;
    color:#ffffff;
    text-shadow:0 0 15px rgba(255,255,255,0.4);
}

.main{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
}

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.left-panel{
    width:350px;
    padding:25px;
}

.enunciado{
    line-height:1.8;
    font-size:16px;
    color:#E2E8F0;
}

.section-title{
    margin-top:20px;
    margin-bottom:10px;
    font-size:18px;
    font-weight:600;
    color:#93C5FD;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#0F172A;
    color:white;
    font-size:16px;
    outline:none;
    border:2px solid transparent;
    transition:0.3s;
}

.input-group input:focus{
    border:2px solid #38BDF8;
    box-shadow:0 0 15px rgba(56,189,248,0.5);
}

.radio-group{
    margin-top:15px;
}

.radio-group label{
    display:block;
    margin-bottom:10px;
    cursor:pointer;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 20px rgba(34,197,94,0.4);
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(34,197,94,0.7);
}

.right-panel{
    flex:1;
    padding:20px;
    min-width:700px;
}

.canvas-title{
    text-align:center;
    font-size:24px;
    font-weight:600;
    margin-bottom:15px;
    color:#93C5FD;
}

canvas{
    width:100%;
    background:linear-gradient(to bottom,#f8fafc,#dbeafe);
    border-radius:20px;
    border:3px solid rgba(255,255,255,0.2);
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.info-box{
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    background:rgba(0,0,0,0.25);
    color:#F8FAFC;
    line-height:1.8;
    min-height:120px;
}

.result-title{
    color:#38BDF8;
    font-weight:bold;
    margin-bottom:10px;
}

@media(max-width:1100px){

    .main{
        flex-direction:column;
    }

    .left-panel,
    .right-panel{
        width:100%;
        min-width:100%;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="titulo">
        SISTEMA DE POLEAS - SEGUNDA LEY DE NEWTON
    </div>

    <div class="main">

        <!-- PANEL IZQUIERDO -->
        <div class="left-panel card">

            <div class="enunciado">
                Dos bloques cuelgan de una polea ideal.<br><br>

                El sistema calcula automáticamente:
                <br><br>

                • Aceleración del sistema<br>
                • Tensión en la cuerda<br>
                • Movimiento de los bloques
            </div>

            <div class="section-title">
                Ingreso de Datos
            </div>

            <div class="input-group">
                <label>Masa Bloque 1 (kg)</label>
                <input type="number" id="m1" value="0">
            </div>

            <div class="input-group">
                <label>Masa Bloque 2 (kg)</label>
                <input type="number" id="m2" value="0">
            </div>

            <div class="section-title">
                Dirección del Movimiento
            </div>

            <div class="radio-group">

                <label>
                    <input type="radio" name="movimiento" value="1" checked>
                    Bloque 1 desciende
                </label>

                <label>
                    <input type="radio" name="movimiento" value="2">
                    Bloque 2 desciende
                </label>

            </div>

            <button onclick="calcular()">
                CALCULAR Y ANIMAR
            </button>

            <div class="info-box">

                <div class="result-title">
                    RESULTADOS
                </div>

                <div id="resultado">
                    Esperando datos...
                </div>

            </div>

        </div>

        <!-- PANEL DERECHO -->
        <div class="right-panel card">

            <div class="canvas-title">
                ANIMACIÓN DEL SISTEMA
            </div>

            <canvas id="canvas" width="900" height="550"></canvas>

        </div>

    </div>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function dibujarSistema(y1, y2){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Fondo técnico
    ctx.strokeStyle = "rgba(0,0,0,0.05)";

    for(let i=0;i<canvas.width;i+=40){

        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,canvas.height);
        ctx.stroke();
    }

    for(let i=0;i<canvas.height;i+=40){

        ctx.beginPath();
        ctx.moveTo(0,i);
        ctx.lineTo(canvas.width,i);
        ctx.stroke();
    }

    // Base superior
    ctx.fillStyle = "#374151";
    ctx.fillRect(320,40,260,25);

    // Polea
    let cx = 450;
    let cy = 160;
    let r = 70;

    let grad = ctx.createRadialGradient(cx,cy,20,cx,cy,70);

    grad.addColorStop(0,"#E5E7EB");
    grad.addColorStop(1,"#6B7280");

    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.lineWidth = 5;
    ctx.strokeStyle = "#111827";
    ctx.stroke();

    // Centro
    ctx.beginPath();
    ctx.arc(cx,cy,15,0,Math.PI*2);
    ctx.fillStyle = "#111";
    ctx.fill();

    // Cuerda
    ctx.strokeStyle = "#B45309";
    ctx.lineWidth = 6;

    ctx.beginPath();
    ctx.moveTo(380,y1);
    ctx.lineTo(380,160);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx,cy,r,Math.PI,0,false);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(520,160);
    ctx.lineTo(520,y2);
    ctx.stroke();

    // Bloque 1
    let grad1 = ctx.createLinearGradient(0,y1,0,y1+100);

    grad1.addColorStop(0,"#ef4444");
    grad1.addColorStop(1,"#991b1b");

    ctx.fillStyle = grad1;

    ctx.fillRect(325,y1,110,100);

    ctx.strokeStyle = "#111";
    ctx.lineWidth = 3;
    ctx.strokeRect(325,y1,110,100);

    // Bloque 2
    let grad2 = ctx.createLinearGradient(0,y2,0,y2+100);

    grad2.addColorStop(0,"#3b82f6");
    grad2.addColorStop(1,"#1e3a8a");

    ctx.fillStyle = grad2;

    ctx.fillRect(465,y2,110,100);

    ctx.strokeStyle = "#111";
    ctx.strokeRect(465,y2,110,100);

    // Texto masas
    ctx.fillStyle = "white";
    ctx.font = "bold 24px Poppins";
    ctx.textAlign = "center";

    ctx.fillText(
        document.getElementById("m1").value + " kg",
        380,
        y1 + 58
    );

    ctx.fillText(
        document.getElementById("m2").value + " kg",
        520,
        y2 + 58
    );
}

function animar(direccion){

    let y1 = 300;
    let y2 = 300;

    const sup = 220;
    const inf = 380;

    let frame = 0;

    function mover(){

        if(frame < 100){

            if(direccion === "bloque1"){

                if(y1 < inf) y1 += 2;
                if(y2 > sup) y2 -= 2;

            }else{

                if(y1 > sup) y1 -= 2;
                if(y2 < inf) y2 += 2;
            }

            dibujarSistema(y1,y2);

            frame++;

            requestAnimationFrame(mover);
        }
    }

    mover();
}

function calcular(){

    let m1 = parseFloat(document.getElementById("m1").value);
    let m2 = parseFloat(document.getElementById("m2").value);

    if(isNaN(m1) || isNaN(m2)){

        alert("Ingrese datos válidos");
        return;
    }

    if(m1 <= 0 || m2 <= 0){

        alert("Las masas deben ser mayores a cero");
        return;
    }

    const g = 9.8;

    const opcion = document.querySelector(
        'input[name="movimiento"]:checked'
    ).value;

    let a;
    let T;

    if(opcion == "1"){

        a = ((m1 - m2) * g) / (m1 + m2);

        T = (2 * m1 * m2 * g) / (m1 + m2);

        document.getElementById("resultado").innerHTML =
        `
        <b>Bloque 1 desciende</b><br><br>

        Aceleración:
        <b>${a.toFixed(2)} m/s²</b><br><br>

        Tensión:
        <b>${T.toFixed(2)} N</b>
        `;

        animar("bloque1");

    }else{

        a = ((m2 - m1) * g) / (m1 + m2);

        T = (2 * m1 * m2 * g) / (m1 + m2);

        document.getElementById("resultado").innerHTML =
        `
        <b>Bloque 2 desciende</b><br><br>

        Aceleración:
        <b>${a.toFixed(2)} m/s²</b><br><br>

        Tensión:
        <b>${T.toFixed(2)} N</b>
        `;

        animar("bloque2");
    }
}

dibujarSistema(300,300);

</script>

</body>
</html>
